<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none" role="img" aria-label="Logo Casa de Ervas Jupira — Cabocla Jupira jovem com onça-pintada">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#2A1F0E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8B830"/>
      <stop offset="50%" stop-color="#F5D86E"/>
      <stop offset="100%" stop-color="#C99A1F"/>
    </linearGradient>
    <linearGradient id="featherGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8B830"/>
      <stop offset="40%" stop-color="#B83A2A"/>
      <stop offset="70%" stop-color="#2D6A3B"/>
      <stop offset="100%" stop-color="#E8B830"/>
    </linearGradient>
    <linearGradient id="jaguarBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <radialGradient id="glowYellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8B830" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8B830" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow circle -->
  <circle cx="250" cy="245" r="230" fill="url(#glowYellow)"/>
  <circle cx="250" cy="245" r="195" fill="url(#bgGrad)" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="250" cy="245" r="188" fill="none" stroke="#E8B830" stroke-width="0.5" opacity="0.3"/>

  <!-- ===== CABOCLA JUPIRA (Left side) ===== -->
  <g transform="translate(-15, 10)">
    <!-- Hair -->
    <path d="M165 170 Q175 145 200 148 Q210 138 230 140 Q250 138 265 153 Q280 168 278 193 Q283 213 281 228 Q273 248 263 258 Q243 268 223 270 Q203 271 188 266 Q168 256 161 243 Q153 228 151 208 Q148 188 165 170Z" fill="#1A0E05"/>

    <!-- Face -->
    <ellipse cx="220" cy="205" rx="42" ry="52" fill="#C4956A"/>

    <!-- Eyes (semi-closed — Jupira works with eyes closed) -->
    <path d="M198 195 Q206 190 214 195" stroke="#1C1C1C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M228 195 Q236 190 244 195" stroke="#1C1C1C" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows (firm) -->
    <path d="M196 188 Q205 182 216 186" stroke="#1C1C1C" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M226 186 Q237 182 246 188" stroke="#1C1C1C" stroke-width="2.2" fill="none" stroke-linecap="round"/>

    <!-- Nose -->
    <path d="M218 198 Q222 212 215 220" stroke="#A07050" stroke-width="1.8" fill="none" stroke-linecap="round"/>

    <!-- Young mouth (subtle smile) -->
    <path d="M207 225 Q215 221 222 222 Q229 221 237 225" stroke="#8B5E3C" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Indigenous face paint - young warrior marks -->
    <circle cx="194" cy="212" r="3.5" fill="#B83A2A" opacity="0.5"/>
    <circle cx="248" cy="212" r="3.5" fill="#B83A2A" opacity="0.5"/>
    <path d="M192 200 L188 194" stroke="#B83A2A" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    <path d="M250 200 L254 194" stroke="#B83A2A" stroke-width="2" opacity="0.4" stroke-linecap="round"/>

    <!-- Feather headdress (penacho) — more feathers, youthful -->
    <path d="M180 160 Q175 110 190 80 Q195 110 193 140 Q196 115 198 155Z" fill="url(#featherGrad)" opacity="0.9"/>
    <path d="M198 148 Q198 98 213 68 Q213 108 208 138 Q211 113 207 148Z" fill="url(#gold)" opacity="0.95"/>
    <path d="M218 145 Q223 90 237 65 Q235 105 230 135 Q235 108 223 145Z" fill="url(#featherGrad)" opacity="0.9"/>
    <path d="M238 148 Q243 100 257 75 Q253 110 247 138 Q252 112 242 148Z" fill="url(#featherGrad)" opacity="0.9"/>
    <path d="M175 168 Q165 125 175 100 Q180 128 180 155Z" fill="url(#gold)" opacity="0.85"/>
    <path d="M258 155 Q265 115 275 92 Q270 122 263 148Z" fill="url(#featherGrad)" opacity="0.85"/>

    <!-- Penacho top feather (tall center) -->
    <path d="M210 140 Q215 50 230 25 Q228 65 225 105 Q230 70 218 140Z" fill="#E8B830" opacity="0.95"/>

    <!-- Headband -->
    <path d="M170 165 Q178 158 195 155 Q215 152 235 155 Q252 158 260 165"
          stroke="url(#gold)" stroke-width="3.5" fill="none"/>
    <!-- Headband detail -->
    <circle cx="215" cy="156" r="3" fill="#B83A2A"/>
    <circle cx="200" cy="157" r="2" fill="#2D6A3B"/>
    <circle cx="230" cy="157" r="2" fill="#2D6A3B"/>

    <!-- Neck -->
    <rect x="208" y="255" width="24" height="16" rx="4" fill="#C4956A"/>

    <!-- Necklace (youthful - seeds) -->
    <path d="M195 265 Q210 278 220 280 Q230 278 245 265" stroke="#B83A2A" stroke-width="2.5" fill="none"/>
    <circle cx="208" cy="275" r="2.5" fill="#E8B830"/>
    <circle cx="220" cy="280" r="3" fill="#B83A2A"/>
    <circle cx="232" cy="275" r="2.5" fill="#E8B830"/>

    <!-- Body/torso suggestion -->
    <path d="M195 270 L205 330 Q210 350 220 355 L220 370 Q200 365 190 350 Q182 330 185 270Z" fill="#2D6A3B" opacity="0.85"/>
    <path d="M245 270 L255 330 Q250 350 240 355 L240 370 Q260 365 270 350 Q278 330 275 270Z" fill="#2D6A3B" opacity="0.85"/>

    <!-- Arrow pointing right -->
    <g transform="translate(275, 180) rotate(-15)">
      <line x1="0" y1="0" x2="75" y2="0" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>
      <polygon points="75,-5 85,0 75,5" fill="#B83A2A"/>
      <path d="M8,-6 L0,0 L8,6" stroke="#E8B830" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- ===== ONÇA-PINTADA (Jaguar - Right side) ===== -->
  <g transform="translate(60, -5)">
    <!-- Tail -->
    <path d="M250 240 Q280 230 295 215 Q305 205 300 195 Q295 190 290 195" stroke="#D4A017" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M250 240 Q280 230 295 215 Q305 205 300 195 Q295 190 290 195" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="3 15" opacity="0.4"/>

    <!-- Body -->
    <ellipse cx="210" cy="260" rx="55" ry="30" fill="url(#jaguarBody)" transform="rotate(-10, 210, 260)"/>

    <!-- Jaguar spots (rosetas) — geometric indigenous style -->
    <circle cx="195" cy="250" r="5" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="195" cy="250" r="1.5" fill="#1A1A2E"/>
    <circle cx="215" cy="245" r="4.5" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="215" cy="245" r="1.5" fill="#1A1A2E"/>
    <circle cx="235" cy="255" r="4" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="235" cy="255" r="1.5" fill="#1A1A2E"/>
    <circle cx="180" cy="262" r="4" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="180" cy="262" r="1.5" fill="#1A1A2E"/>
    <circle cx="205" cy="270" r="4.5" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="205" cy="270" r="1.5" fill="#1A1A2E"/>
    <circle cx="228" cy="268" r="3.5" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="228" cy="268" r="1.5" fill="#1A1A2E"/>
    <circle cx="250" cy="252" r="3" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="250" cy="252" r="1.5" fill="#1A1A2E"/>

    <!-- Front legs -->
    <path d="M180 275 Q178 300 175 320 Q174 328 180 330 Q186 328 185 320 Q186 300 188 275Z" fill="url(#jaguarBody)"/>
    <path d="M200 280 Q198 305 197 325 Q196 332 202 334 Q208 332 207 325 Q206 305 208 280Z" fill="url(#jaguarBody)"/>

    <!-- Paw details -->
    <ellipse cx="178" cy="332" rx="8" ry="4" fill="#D4A017"/>
    <ellipse cx="202" cy="335" rx="8" ry="4" fill="#D4A017"/>
    <!-- Claws -->
    <circle cx="174" cy="334" r="1.5" fill="#1A1A2E"/>
    <circle cx="178" cy="336" r="1.5" fill="#1A1A2E"/>
    <circle cx="182" cy="334" r="1.5" fill="#1A1A2E"/>
    <circle cx="198" cy="337" r="1.5" fill="#1A1A2E"/>
    <circle cx="202" cy="339" r="1.5" fill="#1A1A2E"/>
    <circle cx="206" cy="337" r="1.5" fill="#1A1A2E"/>

    <!-- Chest/neck -->
    <ellipse cx="175" cy="240" rx="20" ry="25" fill="url(#jaguarBody)" transform="rotate(-5, 175, 240)"/>
    <circle cx="168" cy="235" r="3" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="168" cy="235" r="1.5" fill="#1A1A2E"/>
    <circle cx="180" cy="232" r="3" fill="none" stroke="#1A1A2E" stroke-width="1.5"/>
    <circle cx="180" cy="232" r="1.5" fill="#1A1A2E"/>

    <!-- Head -->
    <ellipse cx="160" cy="210" rx="22" ry="20" fill="url(#jaguarBody)"/>

    <!-- Ears -->
    <ellipse cx="146" cy="196" rx="8" ry="6" fill="#D4A017" transform="rotate(-15, 146, 196)"/>
    <ellipse cx="174" cy="196" rx="8" ry="6" fill="#D4A017" transform="rotate(15, 174, 196)"/>
    <!-- Inner ear -->
    <ellipse cx="148" cy="197" rx="4" ry="3" fill="#1A1A2E" opacity="0.5" transform="rotate(-15, 148, 197)"/>
    <ellipse cx="172" cy="197" rx="4" ry="3" fill="#1A1A2E" opacity="0.5" transform="rotate(15, 172, 197)"/>

    <!-- Face spots -->
    <circle cx="150" cy="205" r="2" fill="none" stroke="#1A1A2E" stroke-width="1"/>
    <circle cx="170" cy="205" r="2" fill="none" stroke="#1A1A2E" stroke-width="1"/>
    <circle cx="156" cy="218" r="2" fill="none" stroke="#1A1A2E" stroke-width="1"/>
    <circle cx="164" cy="218" r="2" fill="none" stroke="#1A1A2E" stroke-width="1"/>

    <!-- Eyes (sharp) -->
    <ellipse cx="152" cy="208" rx="4" ry="3" fill="#1A1A2E"/>
    <ellipse cx="168" cy="208" rx="4" ry="3" fill="#1A1A2E"/>
    <circle cx="153" cy="207" r="1.5" fill="#F5D86E"/>
    <circle cx="169" cy="207" r="1.5" fill="#F5D86E"/>

    <!-- Nose -->
    <ellipse cx="160" cy="218" rx="4" ry="2.5" fill="#1A1A2E"/>

    <!-- Mouth -->
    <path d="M156 221 Q160 225 164 221" stroke="#1A1A2E" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Whiskers -->
    <line x1="138" y1="216" x2="128" y2="212" stroke="#1A1A2E" stroke-width="0.8" opacity="0.5"/>
    <line x1="138" y1="220" x2="126" y2="220" stroke="#1A1A2E" stroke-width="0.8" opacity="0.5"/>
    <line x1="182" y1="216" x2="192" y2="212" stroke="#1A1A2E" stroke-width="0.8" opacity="0.5"/>
    <line x1="182" y1="220" x2="194" y2="220" stroke="#1A1A2E" stroke-width="0.8" opacity="0.5"/>

    <!-- Growl line -->
    <path d="M148 224 Q154 228 160 226 Q166 228 172 224" stroke="#1A1A2E" stroke-width="1" fill="none" opacity="0.4"/>
  </g>

  <!-- ===== SACRED DOTS / STARS ===== -->
  <circle cx="120" cy="120" r="2" fill="#E8B830" opacity="0.5"/>
  <circle cx="370" cy="110" r="2" fill="#E8B830" opacity="0.5"/>
  <circle cx="400" cy="180" r="1.5" fill="#F5D86E" opacity="0.4"/>
  <circle cx="100" cy="190" r="1.5" fill="#F5D86E" opacity="0.4"/>
  <circle cx="380" cy="340" r="2" fill="#E8B830" opacity="0.3"/>
  <circle cx="115" cy="350" r="2" fill="#E8B830" opacity="0.3"/>

  <!-- ===== INDIGENOUS GEOMETRIC PATTERN (border) ===== -->
  <!-- Bottom pattern strip -->
  <g opacity="0.6">
    <!-- Ashaninka-inspired triangles -->
    <polygon points="130,410 140,395 150,410" fill="#B83A2A" opacity="0.7"/>
    <polygon points="160,410 170,395 180,410" fill="#B83A2A" opacity="0.7"/>
    <polygon points="190,410 200,395 210,410" fill="#E8B830" opacity="0.7"/>
    <polygon points="220,410 230,395 240,410" fill="#B83A2A" opacity="0.7"/>
    <polygon points="250,410 260,395 270,410" fill="#B83A2A" opacity="0.7"/>
    <polygon points="280,410 290,395 300,410" fill="#E8B830" opacity="0.7"/>
    <polygon points="310,410 320,395 330,410" fill="#B83A2A" opacity="0.7"/>
    <polygon points="340,410 350,395 360,410" fill="#B83A2A" opacity="0.7"/>
    <polygon points="370,410 380,395 390,410" fill="#E8B830" opacity="0.7"/>
  </g>

  <!-- ===== TEXT ===== -->
  <text x="250" y="445" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="24" font-weight="700" fill="#E8B830" letter-spacing="1">
    Casa de Ervas
  </text>
  <text x="250" y="478" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="900" fill="#E8B830" letter-spacing="2">
    JUPIRA
  </text>
  <text x="250" y="498" text-anchor="middle" font-family="'Inter', sans-serif" font-size="10" fill="#B83A2A" font-weight="600" letter-spacing="3" opacity="0.8">
    OKÊ JUPIRA!
  </text>
</svg>
